<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕱𝖔𝖚𝖆𝖉 | 𝕿𝖍𝖊 𝕰𝖙𝖊𝖗𝖓𝖆𝖑 𝖁𝖔𝖎𝖉</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel+Decorative:wght@700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #d4d4d4;
            font-family: 'Cinzel Decorative', cursive; overflow: hidden;
            perspective: 1000px;
        }

        /* تأثير الدخان (Fog) المستمر */
        .fog-container {
            position: fixed; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.15; z-index: -1; pointer-events: none;
        }

        /* شاشة الدخول الاحترافية (Portal) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            transition: 2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        
        .seal-goth {
            font-size: 7rem; color: #1a1a1a;
            animation: rotateSeal 25s infinite linear;
            transition: 1.5s ease-in;
        }
        @keyframes rotateSeal { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .overlay-text {
            font-family: 'UnifrakturMaguntia', cursive; font-size: 3rem;
            color: #222; margin-top: 20px; letter-spacing: 5px;
        }

        /* وميض البرق العشوائي */
        .lightning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: -1;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: -2; opacity: 0.4; }

        /* البطاقة العائمة (Floating Card) */
        .container {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: 3s; transform: scale(1.1);
        }

        .gothic-card {
            background: rgba(5, 5, 5, 0.95); 
            border: 1px solid #1a1a1a;
            padding: 60px 50px; text-align: center;
            width: 420px; position: relative;
            box-shadow: 0 0 100px #000;
            animation: float 6s infinite ease-in-out; /* حركة الطفو التي أعجبتك */
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* زخارف الزوايا القوطية */
        .gothic-card::before, .gothic-card::after {
            content: '♰'; position: absolute; font-size: 1.2rem; color: #222;
        }
        .gothic-card::before { top: 15px; left: 15px; }
        .gothic-card::after { bottom: 15px; right: 15px; }

        /* الصورة الدائرية الأصلية */
        .avatar {
            width: 135px; height: 135px; border-radius: 50%;
            margin: 0 auto 25px; border: 1px solid #222;
            object-fit: cover; display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .age-badge {
            font-size: 0.75rem; letter-spacing: 8px; color: #444;
            margin-bottom: 5px; text-transform: uppercase;
        }

        .name {
            font-family: 'UnifrakturMaguntia', cursive; font-size: 5.5rem;
            margin: 0; background: linear-gradient(180deg, #fff 30%, #333 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1;
            animation: glitch 8s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: skew(0); }
            92% { transform: skew(2deg); opacity: 0.9; }
            95% { transform: skew(-2deg); }
        }

        .hobbies { font-size: 0.6rem; letter-spacing: 3px; color: #666; margin: 20px 0 40px; border-top: 1px solid #111; padding-top: 15px; }

        .links { display: flex; flex-direction: column; gap: 18px; }

        .goth-link {
            text-decoration: none; color: #444; font-family: 'UnifrakturMaguntia', cursive;
            font-size: 1.8rem; transition: 0.5s;
        }

        .goth-link:hover { color: #fff; text-shadow: 0 0 15px #fff; letter-spacing: 5px; }

        #bg-music { display: none; }
    </style>
</head>
<body onclick="awaken()">

    <div id="overlay">
        <div class="seal-goth">♰</div>
        <div class="overlay-text">𝕬𝖜𝖆𝖐𝖊𝖓</div>
    </div>

    <div class="lightning" id="lightning"></div>
    <div class="fog-container"></div>
    <canvas id="canvas"></canvas>

    <div class="container" id="main-content">
        <div class="gothic-card">
            <img src="me.jpg" alt="Fouad" class="avatar">
            
            <div class="age-badge">XVII 𝖄𝖊𝖆𝖗𝖘 𝕺𝖑𝖉</div>
            <h1 class="name">𝕱𝖔𝖚𝖆𝖉</h1>
            <div class="hobbies">𝕮𝖍𝖊𝖘𝖘 • 𝕸𝖆𝖙𝖍 • 𝕮𝖔𝖘𝖒𝖔𝖘</div>

            <div class="links">
                <a href="https://discord.com/users/fouad212." class="goth-link">𝕯𝖎𝖘𝖈𝖔𝖗𝖉</a>
                <a href="https://t.me/RX_F5" class="goth-link">𝕿𝖊𝖑𝖊𝖌𝖗𝖆𝖒</a>
                <a href="https://spacehey.com/fouad212" class="goth-link">𝕾𝖕𝖆𝖈𝖊𝕳𝖊𝖞</a>
                <a href="https://tiktok.com/@fouad_1515" class="goth-link">𝕿𝖎𝖐𝕿𝖔𝖐</a>
                <a href="https://instagram.com/fouad212212" class="goth-link">𝕴𝖓𝖘𝖙𝖆𝖒𝖗𝖆𝖒</a>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];

        function init() {
            w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
            stars = []; for (let i = 0; i < 250; i++) stars.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*2 });
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, w, h);
            stars.forEach(s => {
                s.y += s.s * 0.4; if (s.y > h) s.y = 0;
                ctx.fillStyle = "rgba(100, 100, 100, 0.2)";
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init); init(); draw();

        // إعادة تأثير البرق الذي أعجبك
        function strike() {
            if (Math.random() > 0.985) {
                const l = document.getElementById('lightning');
                l.style.opacity = '0.07';
                setTimeout(() => { l.style.opacity = '0'; }, 80);
            }
            requestAnimationFrame(strike);
        }
        strike();

        function awaken() {
            document.getElementById('bg-music').play();
            document.getElementById('overlay').style.opacity = '0';
            document.getElementById('overlay').style.transform = 'scale(1.2)';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.opacity = '1';
                main.style.transform = 'scale(1)';
            }, 1500);
        }
    </script>
</body>
</html>
